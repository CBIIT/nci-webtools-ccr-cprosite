family: "${ECS_DATA_IMPORT_TASK}"
requiresCompatibilities:
  - FARGATE
networkMode: awsvpc
cpu: "${ECS_IMPORT_CPU_UNITS}"
memory: "${ECS_IMPORT_MEMORY_UNITS}"
executionRoleArn: "${ROLE_ARN}"
taskRoleArn: "${ROLE_ARN}"
volumes:
  - name: database
    efsVolumeConfiguration:
      fileSystemId: "${EFS_ID}"
      transitEncryption: ENABLED
      authorizationConfig:
        accessPointId: "${EFS_ACCESS_POINT_ID}"
        iam: ENABLED
containerDefinitions:
  - name: importer
    image: "${DATA_IMPORT_IMAGE}"
    essential: true
    environment:
      - name: AWS_DEFAULT_REGION
        value: "${AWS_REGION}"
    secrets:
      - name: DATABASE_URL
        valueFrom: "/${APP_NAMESPACE}/${TIER}/${APP}/database_url"
    mountPoints:
      - sourceVolume: database
        containerPath: /deploy/database
        readOnly: false
    logConfiguration:
      logDriver: awsfirelens
      options:
        Name: datadog
        tls: "on"
        tls.verify: "off"
        dd_service: "${TIER}-${APP}-data-import"
        dd_source: "httpd"
        dd_tags: "project:${APP} tier:${TIER}"
        provider: ecs
      secretOptions:
        - name: Host
          valueFrom: /analysistools/${TIER}/datadog/log_endpoint_host
        - name: apikey
          valueFrom: /analysistools/${TIER}/datadog/api_key
tags:
  - key: Project
    value: "${APP}"
  - key: ApplicationName
    value: "${APP}"
  - key: ResourceName
    value: "${TIER}-${APP}-data-import-ecs-task"
  - key: ResourceFunction
    value: compute
  - key: EnvironmentTier
    value: "${ENVIRONMENT_TIER}"
  - key: Creator
    value: CDK