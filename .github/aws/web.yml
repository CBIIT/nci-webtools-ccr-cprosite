# CProSite ECS task definition template.
# This file is intended for env-substitution workflows (e.g. envsubst) before registration.
family: "${ECS_WEB_TASK}"
networkMode: awsvpc
cpu: "${ECS_WEB_TASK_CPU_UNITS}"
memory: "${ECS_WEB_TASK_MEMORY_UNITS}"
executionRoleArn: "${ROLE_ARN}"
taskRoleArn: "${ROLE_ARN}"
requiresCompatibilities:
  - FARGATE
volumes:
  - name: database
    efsVolumeConfiguration:
      fileSystemId: "${EFS_ID}"
      transitEncryption: ENABLED
      authorizationConfig:
        accessPointId: "${EFS_ACCESS_POINT_ID}"
        iam: ENABLED
containerDefinitions:
  - name: logs
    image: public.ecr.aws/aws-observability/aws-for-fluent-bit:stable
    essential: true
    firelensConfiguration:
      type: fluentbit
      options:
        enable-ecs-log-metadata: "true"
    memoryReservation: 50
    logConfiguration:
      logDriver: awslogs
      options:
        awslogs-group: "/analysistools/${TIER}/${APP}/web"
        awslogs-region: "${AWS_REGION}"
        awslogs-stream-prefix: logs

  - name: backend
    image: "${BACKEND_IMAGE_LATEST}"
    essential: true
    portMappings:
      - protocol: tcp
        containerPort: 10000
    environment:
      - name: NODE_ENV
        value: production
      - name: DATABASE
        value: /deploy/database/cprosite.db
    mountPoints:
      - sourceVolume: database
        containerPath: /deploy/database
        readOnly: false
    logConfiguration:
      logDriver: awsfirelens
      options:
        Name: datadog
        tls: "on"
        tls.verify: "off"
        dd_service: "${TIER}-${APP}-backend"
        dd_source: "nodejs"
        dd_tags: "project:${APP} tier:${TIER}"
        provider: ecs
      secretOptions:
        - name: Host
          valueFrom: /analysistools/${TIER}/datadog/log_endpoint_host
        - name: apikey
          valueFrom: /analysistools/${TIER}/datadog/api_key

  - name: frontend
    image: "${FRONTEND_IMAGE_LATEST}"
    essential: true
    portMappings:
      - protocol: tcp
        containerPort: ${WEB_CONTAINER_PORT}
    environment:
      - name: API_HOST
        value: http://localhost:10000
    dependsOn:
      - containerName: backend
        condition: START
    logConfiguration:
      logDriver: awsfirelens
      options:
        Name: datadog
        tls: "on"
        tls.verify: "off"
        dd_service: "${TIER}-${APP}-frontend"
        dd_source: "httpd"
        dd_tags: "project:${APP} tier:${TIER}"
        provider: ecs
      secretOptions:
        - name: Host
          valueFrom: /analysistools/${TIER}/datadog/log_endpoint_host
        - name: apikey
          valueFrom: /analysistools/${TIER}/datadog/api_key
    memoryReservation: 100

tags:
  - key: Project
    value: "${APP}"
  - key: ApplicationName
    value: "${APP}"
  - key: ResourceName
    value: "${TIER}-${APP}-web-ecs-task"
  - key: ResourceFunction
    value: Compute
  - key: EnvironmentTier
    value: "${ENVIRONMENT_TIER}"
  - key: Creator
    value: CDK