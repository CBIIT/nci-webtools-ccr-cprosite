name: Deploy Infrastructure
on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      TIER: ${{ inputs.tier }}
      AWS_REGION: us-east-1

    steps:
      - uses: "actions/checkout@v4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/power-user-github-actions-cicd
          role-session-name: ${{ env.TIER }}-cprosite-infra-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK and dependencies
        run: |
          npm install -g aws-cdk
          cd infrastructure
          npm ci

      - name: CDK Bootstrap
        run: |
          cd infrastructure
          npx cdk bootstrap \
            aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} \
            --context tier=${{ env.TIER }}

      - name: Deploy Network Stack
        run: |
          cd infrastructure
          npx cdk deploy cprosite-network-${{ env.TIER }} \
            --context tier=${{ env.TIER }} \
            --require-approval never

      - name: Deploy Storage Stack (EFS)
        run: |
          cd infrastructure
          npx cdk deploy cprosite-storage-${{ env.TIER }} \
            --context tier=${{ env.TIER }} \
            --require-approval never

      - name: Deploy App Stack (ECS + ALB)
        run: |
          cd infrastructure
          npx cdk deploy cprosite-app-${{ env.TIER }} \
            --context tier=${{ env.TIER }} \
            --require-approval never

      - name: Deployment Summary
        run: |
          cd infrastructure
          echo "Infrastructure Deployment Complete!"
          echo "Environment : ${{ env.TIER }}"
          echo "Region      : ${{ env.AWS_REGION }}"
          echo ""
          echo "=== Stack Outputs ==="
          npx cdk list --context tier=${{ env.TIER }} 2>/dev/null | while read stack; do
            echo "--- $stack ---"
            aws cloudformation describe-stacks --stack-name "$stack" \
              --query "Stacks[0].Outputs[*].[OutputKey,OutputValue]" \
              --output table 2>/dev/null || true
          done