name: Deploy Infrastructure
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  deploy-cprosite-infrastructure:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      TIER: ${{ inputs.tier }}
      CDK_DIR: infrastructure
      CICD_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/power-user-github-actions-cicd


    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ env.CICD_ROLE_ARN }}
          role-session-name: ${{ env.TIER }}-cprosite-infra-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download env files from S3
        run: |
          aws s3 cp \
            "s3://${{ vars.CICD_BUCKET }}/env/${{ env.TIER }}/cprosite/${{ env.TIER }}-cdk.env" \
            "${{ env.CDK_DIR }}/${{ env.TIER }}-cdk.env"
          aws s3 cp \
            "s3://${{ vars.CICD_BUCKET }}/env/${{ env.TIER }}/cprosite/${{ env.TIER }}-app.env" \
            "${{ env.CDK_DIR }}/${{ env.TIER }}-app.env"

      - name: Ensure APP_ROLE_ARN in app env
        working-directory: ${{ env.CDK_DIR }}
        run: |
          APP_ROLE_ARN=$(grep '^APP_ROLE_ARN=' "${{ env.TIER }}-cdk.env" | cut -d'=' -f2-)
          if [[ -z "$APP_ROLE_ARN" ]]; then
            echo "Missing APP_ROLE_ARN in ${{ env.TIER }}-cdk.env"
            exit 1
          fi

          if grep -q '^APP_ROLE_ARN=' "${{ env.TIER }}-app.env"; then
            sed -i.bak "s|^APP_ROLE_ARN=.*$|APP_ROLE_ARN=$APP_ROLE_ARN|" "${{ env.TIER }}-app.env"
            rm -f "${{ env.TIER }}-app.env.bak"
          else
            echo "APP_ROLE_ARN=$APP_ROLE_ARN" >> "${{ env.TIER }}-app.env"
          fi

      - name: Load infrastructure variables from cdk env
        working-directory: ${{ env.CDK_DIR }}
        run: |
          set -a
          source "${{ env.TIER }}-cdk.env"
          set +a
          env | grep -v '^_' >> "$GITHUB_ENV"

      - name: Set APP_ENV_FILE
        working-directory: ${{ env.CDK_DIR }}
        run: echo "APP_ENV_FILE=$(pwd)/${{ env.TIER }}-app.env" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ env.CDK_DIR }}
        run: npm install

      - name: CDK Diff (Preview Changes)
        working-directory: ${{ env.CDK_DIR }}
        run: npx cdk diff --app "npx ts-node bin/app.ts" || true

      - name: Deploy App Stack
        working-directory: ${{ env.CDK_DIR }}
        run: npx cdk deploy cprosite-app-${{ env.TIER }} --require-approval never  --no-rollback --progress

      - name: Clean up env files
        if: always()
        working-directory: ${{ env.CDK_DIR }}
        run: rm -f "${{ env.TIER }}-cdk.env" "${{ env.TIER }}-app.env"