name: Deploy CProSite
on:
    workflow_dispatch:
        inputs:
            tier:
                description: "Deployment Tier"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - qa
                    - stage
                    - prod
            rebuild_backend_image:
                description: "Rebuild backend image"
                required: false
                default: true
                type: boolean
            rebuild_frontend_image:
                description: "Rebuild frontend image"
                required: false
                default: true
                type: boolean
            import_dataset:
                description: "Import cprosite.db dataset"
                required: false
                default: false
                type: boolean
            no_cache:
                description: "Build without cache"
                required: false
                default: false
                type: boolean

env:
    APP: cprosite
    TZ: America/New_York

jobs:
    Deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.tier }}
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.x'

            - name: Install Ansible
              run: |
                  python -m pip install --upgrade pip
                  pip install ansible

            - name: Configure SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

            - name: Create Ansible inventory
              run: |
                  cat > inventory.ini << EOF
                  [build]
                  ${{ secrets.DEPLOY_HOST }} ansible_user=${{ secrets.DEPLOY_USER }}

                  [app]
                  ${{ secrets.DEPLOY_HOST }} ansible_user=${{ secrets.DEPLOY_USER }}
                  EOF

            - name: Create Ansible variables file
              run: |
                  cat > vars.yml << EOF
                  tier: ${{ inputs.tier }}
                  app_git_tag: ${{ github.ref_name }}
                  rebuild_backend_image: ${{ inputs.rebuild_backend_image }}
                  rebuild_frontend_image: ${{ inputs.rebuild_frontend_image }}
                  import_dataset: ${{ inputs.import_dataset }}
                  no_cache: ${{ inputs.no_cache }}
                  workspace_folder: ${{ github.workspace }}
                  docker_registry: ${{ secrets.DOCKER_REGISTRY }}
                  docker_username: ${{ secrets.DOCKER_USERNAME }}
                  docker_password: ${{ secrets.DOCKER_PASSWORD }}
                  docker_app_root: ${{ secrets.DOCKER_APP_ROOT }}
                  docker_app_code_folder: ${{ secrets.DOCKER_APP_CODE_FOLDER }}
                  docker_app_config_folder: ${{ secrets.DOCKER_APP_CONFIG_FOLDER }}
                  docker_app_data_folder: ${{ secrets.DOCKER_APP_DATA_FOLDER }}
                  docker_app_logs_folder: ${{ secrets.DOCKER_APP_LOGS_FOLDER }}
                  docker_app_apache_logs_folder: ${{ secrets.DOCKER_APP_APACHE_LOGS_FOLDER }}
                  ncianalysis_user: ${{ secrets.NCIANALYSIS_USER }}
                  database_url: ${{ secrets.DATABASE_URL }}
                  EOF

            - name: Run Ansible playbook
              run: |
                  ansible-playbook \
                    -i inventory.ini \
                    -e @vars.yml \
                    cprosite-deploy.yml

            - name: Deployment summary
              if: success()
              run: |
                  echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
                  echo "- **Application**: cprosite" >> $GITHUB_STEP_SUMMARY
                  echo "- **Environment**: ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Git Reference**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Backend Image Rebuilt**: ${{ inputs.rebuild_backend_image }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Frontend Image Rebuilt**: ${{ inputs.rebuild_frontend_image }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Database Imported**: ${{ inputs.import_dataset }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Deployed to**: ${{ secrets.DEPLOY_HOST }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY