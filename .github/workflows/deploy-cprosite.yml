name: Deploy CProSite
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Deployment Tier"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  Deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      APP: cprosite
      TIER: ${{ inputs.tier }}
      TZ: America/New_York
      AWS_REGION: us-east-1
      ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_WEB_SERVICE: ${{ vars.ECS_WEB_SERVICE }}
      ECS_WEB_TASK: ${{ vars.ECS_WEB_TASK }}
      BACKEND_IMAGE: ""
      FRONTEND_IMAGE: ""
      BACKEND_IMAGE_LATEST: ""
      FRONTEND_IMAGE_LATEST: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/power-user-github-actions-cicd
          role-session-name: ${{ env.TIER }}-${{ env.APP }}-deploy-${{ github.ref_name }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Set dynamic environment variables
        run: |
          DEPLOY_DATE=$(date +"%Y-%m-%d")
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          REPO=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$APP

          echo "DEPLOY_DATE=$DEPLOY_DATE" >> $GITHUB_ENV
          echo "IMAGE_REPOSITORY=$REPO" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$REPO:frontend-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=$REPO:backend-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE_LATEST=$REPO:frontend-${{ github.ref_name }}-latest" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_LATEST=$REPO:backend-${{ github.ref_name }}-latest" >> $GITHUB_ENV
          echo "ENVIRONMENT_TIER=${TIER^^}" >> $GITHUB_ENV

          if [[ "$TIER" == "dev" ]]; then
              echo "LOG_LEVEL=debug" >> $GITHUB_ENV
          else
              echo "LOG_LEVEL=info" >> $GITHUB_ENV
          fi


      - name: Validate required ECS parameters
        run: |
          : "${ECS_CLUSTER:?Set ECS_CLUSTER in GitHub environment variables}"
          : "${ECS_WEB_SERVICE:?Set ECS_WEB_SERVICE in GitHub environment variables}"
          : "${ECS_WEB_TASK:?Set ECS_WEB_TASK in GitHub environment variables}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build and push backend image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: docker/backend.dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Deploy to ECS (force new deployment)
        run: |
          CLUSTER="${ECS_CLUSTER:-cprosite-${{ inputs.tier }}}"
          SERVICE="${ECS_WEB_SERVICE:-cprosite-${{ inputs.tier }}}"

          echo "Forcing new ECS deployment..."
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --output table \
            --query "service.{Status:status,DesiredCount:desiredCount,RunningCount:runningCount}"

      - name: Remove old task definitions
        run: |
          for family in "$ECS_WEB_TASK"; do
              echo "Pruning old revisions for family: $family"
              aws ecs list-task-definitions --family-prefix "$family" --sort DESC --query 'taskDefinitionArns[3:]' --output text \
                  | xargs -n1 -r aws ecs deregister-task-definition --task-definition
          done

      - name: Clean up env files
        if: always()
        run: true

