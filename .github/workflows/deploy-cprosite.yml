name: Deploy CProSite
on:
    workflow_dispatch:
        inputs:
            tier:
                description: "Deployment Tier"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - qa
                    - stage
                    - prod

env:
    APP: cprosite
    TZ: America/New_York
    AWS_REGION: us-east-1
    AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
    ECR_REPOSITORY: cprosite
    DOCKER_APP_ROOT: /local/content/docker_apps/cprosite
    DOCKER_APP_CONFIG_FOLDER: /local/content/docker_apps/cprosite/config
    DOCKER_APP_LOGS_FOLDER: /local/content/docker_apps/cprosite/logs
    DOCKER_APP_DATA_FOLDER: /local/content/docker_apps/cprosite/data

jobs:
    Deploy:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        environment: ${{ inputs.tier }}
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v5.1.0
              with:
                role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ec2-role-analysistools-${{ inputs.tier }}-role
                aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push backend image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: docker/backend.dockerfile
                push: true
                tags: |
                  ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-${{ github.sha }}
                  ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-latest
                cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-latest
                cache-to: type=inline

            - name: Build and push frontend image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: docker/frontend.dockerfile
                push: true
                tags: |
                  ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-${{ github.sha }}
                  ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-latest
                cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-latest
                cache-to: type=inline

            - name: Prepare docker-compose file
              run: |
                export ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
                export ECR_REPOSITORY="${{ env.ECR_REPOSITORY }}"
                export TIER="${{ inputs.tier }}"
                export DOCKER_APP_CONFIG_FOLDER="${{ env.DOCKER_APP_CONFIG_FOLDER }}"
                export DOCKER_APP_LOGS_FOLDER="${{ env.DOCKER_APP_LOGS_FOLDER }}"
                export DOCKER_APP_DATA_FOLDER="${{ env.DOCKER_APP_DATA_FOLDER }}"
                
                envsubst < docker/docker-compose.deploy.yml > docker-compose-rendered.yml
                
                echo "Rendered docker-compose.yml:"
                cat docker-compose-rendered.yml
                
                # Base64 encode for safe transfer
                COMPOSE_BASE64=$(base64 -w 0 docker-compose-rendered.yml 2>/dev/null || base64 docker-compose-rendered.yml)
                echo "compose_base64=$COMPOSE_BASE64" >> $GITHUB_OUTPUT
              id: compose

            - name: Get EC2 instance ID
              id: get-instance
              run: |
                INSTANCE_ID=$(aws ec2 describe-instances \
                  --filters "Name=tag:Name,Values=${{ secrets.EC2_INSTANCE_NAME }}" \
                            "Name=instance-state-name,Values=running" \
                  --query "Reservations[0].Instances[0].InstanceId" \
                  --output text)
                
                if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
                  echo "Error: Could not find running EC2 instance with name ${{ secrets.EC2_INSTANCE_NAME }}"
                  exit 1
                fi
                
                echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
                echo "Found EC2 instance: $INSTANCE_ID"

            - name: Deploy to EC2 via SSM
              run: |
                # Create deployment commands as JSON
                cat > commands.json << 'EOF'
                {
                  "Parameters": {
                    "commands": [
                      "set -e",
                      "echo '=== Starting deployment ==='",
                      "cd ${{ env.DOCKER_APP_ROOT }}",
                      "echo '=== Logging in to ECR ==='",
                      "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
                      "echo '=== Creating required directories ==='",
                      "mkdir -p ${{ env.DOCKER_APP_CONFIG_FOLDER }}",
                      "mkdir -p ${{ env.DOCKER_APP_LOGS_FOLDER }}",
                      "echo '=== Checking and creating config.json if needed ==='",
                      "if [ ! -f ${{ env.DOCKER_APP_CONFIG_FOLDER }}/config.json ]; then echo 'config.json not found, creating default...'; cat > ${{ env.DOCKER_APP_CONFIG_FOLDER }}/config.json << 'CONFIG_EOF'\n{\n  \"database\": \"../database/cprosite.db\",\n  \"server\": {\n    \"port\": 10000,\n    \"client\": \"../client/build\"\n  },\n  \"logs\": {\n    \"folder\": \"logs\",\n    \"level\": \"info\"\n  }\n}\nCONFIG_EOF\nelse echo 'config.json already exists'; fi",
                      "echo 'Current config.json:'; cat ${{ env.DOCKER_APP_CONFIG_FOLDER }}/config.json",
                      "echo '=== Creating docker-compose.yml ==='",
                      "echo '${{ steps.compose.outputs.compose_base64 }}' | base64 -d > docker-compose.yml",
                      "echo 'Generated docker-compose.yml:'; cat docker-compose.yml",
                      "echo '=== Checking database ==='",
                      "ls -lh ${{ env.DOCKER_APP_DATA_FOLDER }}/ || echo 'Data directory does not exist'",
                      "if [ -f ${{ env.DOCKER_APP_DATA_FOLDER }}/cprosite.db ]; then echo 'Database file exists'; ls -lh ${{ env.DOCKER_APP_DATA_FOLDER }}/cprosite.db; else echo 'WARNING: Database file not found at ${{ env.DOCKER_APP_DATA_FOLDER }}/cprosite.db'; fi",
                      "echo '=== Pulling latest images ==='",
                      "docker compose pull --quiet",
                      "echo '=== Stopping cprosite containers by name ==='",
                      "docker ps --filter name=cprosite -q | xargs -r docker stop || echo 'No cprosite containers running'",
                      "echo '=== Finding and stopping containers on port 8400 ==='",
                      "CONTAINER_8400=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '0.0.0.0:8400' | awk '{print $1}')",
                      "if [ -n \"$CONTAINER_8400\" ]; then echo \"Stopping container using port 8400: $CONTAINER_8400\"; docker stop $CONTAINER_8400; fi",
                      "echo '=== Finding and stopping containers on port 10000 ==='",
                      "CONTAINER_10000=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '0.0.0.0:10000' | awk '{print $1}')",
                      "if [ -n \"$CONTAINER_10000\" ]; then echo \"Stopping container using port 10000: $CONTAINER_10000\"; docker stop $CONTAINER_10000; fi",
                      "echo '=== Running compose down ==='",
                      "docker compose down --remove-orphans || true",
                      "echo '=== Removing only cprosite containers ==='",
                      "docker ps -a --filter name=cprosite -q | xargs -r docker rm -f || echo 'No cprosite containers to remove'",
                      "echo '=== Waiting for port release ==='",
                      "sleep 3",
                      "echo '=== Current containers ==='",
                      "docker ps -a",
                      "echo '=== Starting new containers ==='",
                      "docker compose up -d",
                      "echo '=== Verifying database mount in container ==='",
                      "docker compose exec -T backend ls -lh /deploy/database/ || echo 'Cannot access /deploy/database in container'",
                      "docker compose exec -T backend test -f /deploy/database/cprosite.db && echo 'Database file accessible in container' || echo 'WARNING: Database file NOT accessible in container'",
                      "echo '=== Checking mounted config.json ==='",
                      "docker compose exec -T backend cat /deploy/server/config.json",
                      "echo '=== Running containers ==='",
                      "docker compose ps",
                      "docker compose exec -T backend du -h /deploy/database/cprosite.db 2>/dev/null || echo 'Cannot get database size'",
                      "echo '=== Checking backend logs ==='",
                      "docker compose logs backend --tail 50",
                      "echo '=== Deployment completed successfully ==='"
                    ]
                  }
                }
                EOF
                
                # Send command to EC2 and execute
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
                  --document-name "AWS-RunShellScript" \
                  --cli-input-json file://commands.json \
                  --query "Command.CommandId" \
                  --output text)
                
                echo "SSM Command ID: $COMMAND_ID"
                
                # Wait for the command to finish
                echo "Waiting for deployment to complete..."
                for i in {1..60}; do
                  STATUS=$(aws ssm get-command-invocation \
                    --command-id "$COMMAND_ID" \
                    --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                    --query "Status" \
                    --output text)
                  
                  echo "Status: $STATUS (attempt $i/60)"
                  
                  if [[ "$STATUS" == "Success" ]]; then
                    echo "✅ Deployment successful!"
                    break
                  elif [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut)$ ]]; then
                    echo "❌ Deployment failed with status: $STATUS"
                    
                    # Print error details before exiting
                    echo ""
                    echo "=== Deployment Output ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardOutputContent" \
                      --output text
                    
                    echo ""
                    echo "=== Deployment Errors ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardErrorContent" \
                      --output text
                    
                    exit 1
                  fi
                  
                  sleep 5
                done
                
                # Get the output on success
                echo ""
                echo "=== Deployment Output ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                  --query "StandardOutputContent" \
                  --output text

            - name: Import dataset
              if: ${{ inputs.import_dataset }}
              run: |
                echo "Importing dataset via SSM..."
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
                  --document-name "AWS-RunShellScript" \
                  --parameters 'commands=["cd ${{ env.DOCKER_APP_ROOT }}/database && npm run import"]' \
                  --query "Command.CommandId" \
                  --output text)
                
                # Wait and check status
                sleep 10
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                  --query "StandardOutputContent" \
                  --output text

            - name: Deployment summary
              if: success()
              run: |
                echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
                echo "- **Application**: cprosite" >> $GITHUB_STEP_SUMMARY
                echo "- **Environment**: ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Git Reference**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Backend Image**: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Frontend Image**: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Database Imported**: ${{ inputs.import_dataset }}" >> $GITHUB_STEP_SUMMARY
                echo "- **EC2 Instance**: ${{ steps.get-instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
