name: Deploy CProSite
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Deployment Tier"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  Deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      APP: cprosite
      TZ: America/New_York
      AWS_REGION: us-east-1
      APP_HOST_ROOT: /local/content/docker_apps/cprosite
      APP_HOST_CONFIG_FOLDER: /local/content/docker_apps/cprosite/config
      APP_HOST_LOGS_FOLDER: /local/content/docker_apps/cprosite/logs
      APP_HOST_DATA_FOLDER: /local/content/docker_apps/cprosite/data
      FRONTEND_PORT: 8400
      BACKEND_PORT: 10000
      DOCKER_COMPOSE_TEMPLATE_PATH: docker/docker-compose.deploy.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/ec2-role-analysistools-${{ inputs.tier }}-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Set dynamic environment variables
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          REPO=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$APP
          echo "ECR_REGISTRY=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$REPO:frontend-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=$REPO:backend-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE_LATEST=$REPO:frontend-${{ github.ref_name }}-latest" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_LATEST=$REPO:backend-${{ github.ref_name }}-latest" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push backend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/backend.dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/frontend.dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Prepare docker-compose file
        id: compose
        run: |
          envsubst < $DOCKER_COMPOSE_TEMPLATE_PATH > docker-compose-rendered.yml

          echo "Rendered docker-compose.yml:"
          cat docker-compose-rendered.yml

          COMPOSE_BASE64=$(base64 -w 0 docker-compose-rendered.yml 2>/dev/null || base64 docker-compose-rendered.yml)
          echo "compose_base64=$COMPOSE_BASE64" >> $GITHUB_OUTPUT

      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ vars.EC2_INSTANCE_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running EC2 instance with name ${{ vars.EC2_INSTANCE_NAME }}"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSM
        run: |
          # Create deployment commands as JSON
          cat > commands.json << 'EOF'
          {
            "Parameters": {
              "commands": [
                "set -e",
                "cd ${{ env.APP_HOST_ROOT }}",
                "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
                "mkdir -p ${{ env.APP_HOST_CONFIG_FOLDER }} ${{ env.APP_HOST_LOGS_FOLDER }} ${{ env.APP_HOST_DATA_FOLDER }}",
                "if [ ! -f ${{ env.APP_HOST_CONFIG_FOLDER }}/config.json ]; then cat > ${{ env.APP_HOST_CONFIG_FOLDER }}/config.json << 'CONFIG_EOF'\n{\n  \"database\": \"../database/cprosite.db\",\n  \"server\": {\n    \"port\": 10000,\n    \"client\": \"../client/build\"\n  },\n  \"logs\": {\n    \"folder\": \"logs\",\n    \"level\": \"info\"\n  }\n}\nCONFIG_EOF\nfi",
                "echo '${{ steps.compose.outputs.compose_base64 }}' | base64 -d > docker-compose.yml",
                "if [ ! -f ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db ]; then echo 'WARNING: Database file not found at ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db'; fi",
                "docker compose pull --quiet",
                "docker ps --filter name=cprosite -q | xargs -r docker stop || true",
                "CONTAINER_${{ env.FRONTEND_PORT }}=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '0.0.0.0:${{ env.FRONTEND_PORT }}' | awk '{print $1}')",
                "if [ -n \"$CONTAINER_${{ env.FRONTEND_PORT }}\" ]; then docker stop $CONTAINER_${{ env.FRONTEND_PORT }}; fi",
                "CONTAINER_${{ env.BACKEND_PORT }}=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '0.0.0.0:${{ env.BACKEND_PORT }}' | awk '{print $1}')",
                "if [ -n \"$CONTAINER_${{ env.BACKEND_PORT }}\" ]; then docker stop $CONTAINER_${{ env.BACKEND_PORT }}; fi",
                "docker compose down --remove-orphans || true",
                "docker ps -a --filter name=cprosite -q | xargs -r docker rm -f || true",
                "sleep 3",
                "docker compose up -d"
              ]
            }
          }
          EOF

          # Send command to EC2 and execute
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --cli-input-json file://commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for the command to finish
          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query "Status" \
              --output text)

            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Deployment successful!"
              break
            elif [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut)$ ]]; then
              echo "❌ Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardOutputContent" \
                --output text
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            
            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
            --query "StandardOutputContent" \
            --output text

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tier:** ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
