name: Deploy CProSite
on:
    workflow_dispatch:
        inputs:
            tier:
                description: "Deployment Tier"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - qa
                    - stage
                    - prod
            rebuild_backend_image:
                description: "Rebuild backend image"
                required: false
                default: true
                type: boolean
            rebuild_frontend_image:
                description: "Rebuild frontend image"
                required: false
                default: true
                type: boolean
            import_dataset:
                description: "Import cprosite.db dataset"
                required: false
                default: false
                type: boolean
            no_cache:
                description: "Build without cache"
                required: false
                default: false
                type: boolean

env:
    APP: cprosite
    TZ: America/New_York
    AWS_REGION: us-east-1
    AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/${{ env.APP }}
    ECR_REPOSITORY: ${{ env.APP }}
    DOCKER_APP_ROOT: /local/content/docker_apps/${{ env.APP }}
    DOCKER_APP_CONFIG_FOLDER: /local/content/docker_apps/${{ env.APP }}/config
    DOCKER_APP_LOGS_FOLDER: /local/content/docker_apps/${{ env.APP }}/logs

jobs:
    Deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.tier }}
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ec2-role-analysistools-${{ inputs.tier }}-role
                aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set image tags
              id: image-tags
              run: |
                echo "backend_tag=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-${{ github.sha }}" >> $GITHUB_OUTPUT
                echo "frontend_tag=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-${{ github.sha }}" >> $GITHUB_OUTPUT
                echo "backend_latest=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-latest" >> $GITHUB_OUTPUT
                echo "frontend_latest=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-latest" >> $GITHUB_OUTPUT

            - name: Build and push backend image
              if: ${{ inputs.rebuild_backend_image }}
              run: |
                CACHE_ARG=""
                if [ "${{ inputs.no_cache }}" == "true" ]; then
                  CACHE_ARG="--no-cache"
                fi
                
                docker build $CACHE_ARG \
                  -f docker/backend.dockerfile \
                  -t ${{ steps.image-tags.outputs.backend_tag }} \
                  -t ${{ steps.image-tags.outputs.backend_latest }} \
                  .
                
                docker push ${{ steps.image-tags.outputs.backend_tag }}
                docker push ${{ steps.image-tags.outputs.backend_latest }}

            - name: Build and push frontend image
              if: ${{ inputs.rebuild_frontend_image }}
              run: |
                CACHE_ARG=""
                if [ "${{ inputs.no_cache }}" == "true" ]; then
                  CACHE_ARG="--no-cache"
                fi
                
                docker build $CACHE_ARG \
                  -f docker/frontend.dockerfile \
                  -t ${{ steps.image-tags.outputs.frontend_tag }} \
                  -t ${{ steps.image-tags.outputs.frontend_latest }} \
                  .
                
                docker push ${{ steps.image-tags.outputs.frontend_tag }}
                docker push ${{ steps.image-tags.outputs.frontend_latest }}

            - name: Get EC2 instance ID
              id: get-instance
              run: |
                INSTANCE_ID=$(aws ec2 describe-instances \
                  --filters "Name=tag:Name,Values=${{ secrets.EC2_INSTANCE_NAME }}" \
                            "Name=instance-state-name,Values=running" \
                  --query "Reservations[0].Instances[0].InstanceId" \
                  --output text)
                
                if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
                  echo "Error: Could not find running EC2 instance with name ${{ secrets.EC2_INSTANCE_NAME }}"
                  exit 1
                fi
                
                echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
                echo "Found EC2 instance: $INSTANCE_ID"

            - name: Deploy to EC2 via SSM
              run: |
                # Create deployment commands as JSON
                cat > commands.json << 'EOF'
                {
                  "Parameters": {
                    "commands": [
                      "set -e",
                      "echo '=== Starting deployment ==='",
                      "cd ${{ env.DOCKER_APP_ROOT }}",
                      "echo '=== Logging in to ECR ==='",
                      "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
                      "echo '=== Checking and creating config.json if needed ==='",
                      "mkdir -p ${{ env.DOCKER_APP_CONFIG_FOLDER }}",
                      "if [ ! -f ${{ env.DOCKER_APP_CONFIG_FOLDER }}/config.json ]; then echo 'config.json not found, creating default...'; cat > ${{ env.DOCKER_APP_CONFIG_FOLDER }}/config.json << 'CONFIG_EOF'\n{\n  \"database\": \"../database/cprosite.db\",\n  \"server\": {\n    \"port\": 10000,\n    \"client\": \"../client/build\"\n  },\n  \"logs\": {\n    \"folder\": \"logs\",\n    \"level\": \"info\"\n  }\n}\nCONFIG_EOF\nelse echo 'config.json already exists'; fi",
                      "echo 'Current config.json:'; cat ${{ env.DOCKER_APP_CONFIG_FOLDER }}/config.json",
                      "echo '=== Creating docker-compose.yml ==='",
                      "cat > docker-compose.yml << 'COMPOSE_EOF'\nversion: \"3\"\nservices:\n  backend:\n    image: ${{ steps.image-tags.outputs.backend_latest }}\n    volumes:\n      - \"${{ env.DOCKER_APP_CONFIG_FOLDER }}/config.json:/deploy/server/config.json:ro\"\n      - \"${{ env.DOCKER_APP_LOGS_FOLDER }}:/deploy/logs\"\n      - \"${{ env.DOCKER_APP_ROOT }}/database:/deploy/database\"\n    ports:\n      - \"10000:8000\"\n    restart: unless-stopped\n  frontend:\n    image: ${{ steps.image-tags.outputs.frontend_latest }}\n    environment:\n      API_HOST: http://backend:8000\n    ports:\n      - \"8400:80\"\n    restart: unless-stopped\nCOMPOSE_EOF",
                      "echo '=== Checking database ==='",
                      "ls -lh ${{ env.DOCKER_APP_ROOT }}/database/ || echo 'Database directory does not exist'",
                      "if [ -f ${{ env.DOCKER_APP_ROOT }}/database/cprosite.db ]; then echo 'Database file exists'; ls -lh ${{ env.DOCKER_APP_ROOT }}/database/cprosite.db; else echo 'WARNING: Database file not found at ${{ env.DOCKER_APP_ROOT }}/database/cprosite.db'; fi",
                      "echo '=== Searching for existing cprosite.db files on EC2 ==='",
                      "find /local -name 'cprosite.db' -type f -size +1M 2>/dev/null || echo 'No cprosite.db files larger than 1MB found'",
                      "echo '=== Copying real database if current one is empty ==='",
                      "if [ ! -s ${{ env.DOCKER_APP_ROOT }}/database/cprosite.db ]; then echo 'Database is empty, searching for real database...'; REAL_DB=$(find /local -name 'cprosite.db' -type f -size +1M 2>/dev/null | head -1); if [ -n \"$REAL_DB\" ]; then echo \"Found real database at $REAL_DB\"; cp -v \"$REAL_DB\" ${{ env.DOCKER_APP_ROOT }}/database/cprosite.db; ls -lh ${{ env.DOCKER_APP_ROOT }}/database/cprosite.db; else echo 'No real database found'; fi; else echo 'Database already exists and is not empty'; fi",
                      "echo '=== Pulling latest images ==='",
                      "docker compose pull --quiet",
                      "echo '=== Stopping cprosite containers by name ==='",
                      "docker ps --filter name=cprosite -q | xargs -r docker stop || echo 'No cprosite containers running'",
                      "echo '=== Finding and stopping containers on port 8400 ==='",
                      "CONTAINER_8400=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '0.0.0.0:8400' | awk '{print $1}')",
                      "if [ -n \"$CONTAINER_8400\" ]; then echo \"Stopping container using port 8400: $CONTAINER_8400\"; docker stop $CONTAINER_8400; fi",
                      "echo '=== Finding and stopping containers on port 10000 ==='",
                      "CONTAINER_10000=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '0.0.0.0:10000' | awk '{print $1}')",
                      "if [ -n \"$CONTAINER_10000\" ]; then echo \"Stopping container using port 10000: $CONTAINER_10000\"; docker stop $CONTAINER_10000; fi",
                      "echo '=== Running compose down ==='",
                      "docker compose down --remove-orphans || true",
                      "echo '=== Removing only cprosite containers ==='",
                      "docker ps -a --filter name=cprosite -q | xargs -r docker rm -f || echo 'No cprosite containers to remove'",
                      "echo '=== Waiting for port release ==='",
                      "sleep 3",
                      "echo '=== Current containers ==='",
                      "docker ps -a",
                      "echo '=== Starting new containers ==='",
                      "docker compose up -d",
                      "echo '=== Verifying database mount in container ==='",
                      "docker compose exec -T backend ls -lh /deploy/database/ || echo 'Cannot access /deploy/database in container'",
                      "docker compose exec -T backend test -f /deploy/database/cprosite.db && echo 'Database file accessible in container' || echo 'WARNING: Database file NOT accessible in container'",
                      "echo '=== Checking mounted config.json ==='",
                      "docker compose exec -T backend cat /deploy/server/config.json",
                      "echo '=== Running containers ==='",
                      "docker compose ps",
                      "echo '=== Checking backend logs ==='",
                      "docker compose logs backend --tail 50",
                      "echo '=== Deployment completed successfully ==='"
                    ]
                  }
                }
                EOF
                
                # Send command to EC2 and execute
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
                  --document-name "AWS-RunShellScript" \
                  --cli-input-json file://commands.json \
                  --query "Command.CommandId" \
                  --output text)
                
                echo "SSM Command ID: $COMMAND_ID"
                
                # Wait for the command to finish
                echo "Waiting for deployment to complete..."
                for i in {1..60}; do
                  STATUS=$(aws ssm get-command-invocation \
                    --command-id "$COMMAND_ID" \
                    --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                    --query "Status" \
                    --output text)
                  
                  echo "Status: $STATUS (attempt $i/60)"
                  
                  if [[ "$STATUS" == "Success" ]]; then
                    echo "✅ Deployment successful!"
                    break
                  elif [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut)$ ]]; then
                    echo "❌ Deployment failed with status: $STATUS"
                    
                    # Print error details before exiting
                    echo ""
                    echo "=== Deployment Output ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardOutputContent" \
                      --output text
                    
                    echo ""
                    echo "=== Deployment Errors ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardErrorContent" \
                      --output text
                    
                    exit 1
                  fi
                  
                  sleep 5
                done
                
                # Get the output on success
                echo ""
                echo "=== Deployment Output ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                  --query "StandardOutputContent" \
                  --output text

            - name: Import dataset
              if: ${{ inputs.import_dataset }}
              run: |
                echo "Importing dataset via SSM..."
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
                  --document-name "AWS-RunShellScript" \
                  --parameters 'commands=["cd ${{ env.DOCKER_APP_ROOT }}/database && npm run import"]' \
                  --query "Command.CommandId" \
                  --output text)
                
                # Wait and check status
                sleep 10
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                  --query "StandardOutputContent" \
                  --output text

            - name: Deployment summary
              if: success()
              run: |
                echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
                echo "- **Application**: cprosite" >> $GITHUB_STEP_SUMMARY
                echo "- **Environment**: ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Git Reference**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Backend Image**: ${{ steps.image-tags.outputs.backend_tag }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Frontend Image**: ${{ steps.image-tags.outputs.frontend_tag }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Backend Rebuilt**: ${{ inputs.rebuild_backend_image }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Frontend Rebuilt**: ${{ inputs.rebuild_frontend_image }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Database Imported**: ${{ inputs.import_dataset }}" >> $GITHUB_STEP_SUMMARY
                echo "- **EC2 Instance**: ${{ steps.get-instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
