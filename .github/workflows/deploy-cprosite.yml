name: Deploy CProSite
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Deployment Tier"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  Deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      APP: cprosite
      TZ: America/New_York
      AWS_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/power-user-github-actions-cicd
          aws-region: ${{ env.AWS_REGION }}

      - name: Set dynamic environment variables
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          REPO=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          echo "ECR_REGISTRY=$REPO" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=$REPO/cprosite-backend-${{ inputs.tier }}:${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$REPO/cprosite-frontend-${{ inputs.tier }}:${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_LATEST=$REPO/cprosite-backend-${{ inputs.tier }}:${{ inputs.tier }}-latest" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE_LATEST=$REPO/cprosite-frontend-${{ inputs.tier }}:${{ inputs.tier }}-latest" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Deploy to ECS (force new deployment)
        run: |
          CLUSTER="cprosite-${{ inputs.tier }}"
          SERVICE="cprosite-${{ inputs.tier }}"

          echo "Forcing new ECS deployment..."
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --output table \
            --query "service.{Status:status,DesiredCount:desiredCount,RunningCount:runningCount}"

      - name: Wait for ECS service to stabilize
        run: |
          CLUSTER="cprosite-${{ inputs.tier }}"
          SERVICE="cprosite-${{ inputs.tier }}"

          echo "Waiting for ECS service to reach steady state (up to 10 min)..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region ${{ env.AWS_REGION }}
          echo "Service is stable."

      - name: Deployment summary
        run: |
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "cprosite-app-${{ inputs.tier }}" \
            --query "Stacks[0].Outputs[?OutputKey=='LoadBalancerDns'].OutputValue" \
            --output text 2>/dev/null || echo "N/A")

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tier:** ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend image:** ${{ env.BACKEND_IMAGE_LATEST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend image:** ${{ env.FRONTEND_IMAGE_LATEST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Application URL:** http://$ALB_DNS" >> $GITHUB_STEP_SUMMARY
