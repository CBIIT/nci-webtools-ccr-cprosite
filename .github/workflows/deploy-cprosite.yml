name: Deploy CProSite
on:
    workflow_dispatch:
        inputs:
            tier:
                description: "Deployment Tier"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - qa
                    - stage
                    - prod
            rebuild_backend_image:
                description: "Rebuild backend image"
                required: false
                default: true
                type: boolean
            rebuild_frontend_image:
                description: "Rebuild frontend image"
                required: false
                default: true
                type: boolean
            import_dataset:
                description: "Import cprosite.db dataset"
                required: false
                default: false
                type: boolean
            no_cache:
                description: "Build without cache"
                required: false
                default: false
                type: boolean

env:
    APP: cprosite
    TZ: America/New_York
    AWS_REGION: us-east-1
    ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
    ECR_REPOSITORY: cprosite

jobs:
    Deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.tier }}
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set image tags
              id: image-tags
              run: |
                echo "backend_tag=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-${{ github.sha }}" >> $GITHUB_OUTPUT
                echo "frontend_tag=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-${{ github.sha }}" >> $GITHUB_OUTPUT
                echo "backend_latest=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:backend-${{ inputs.tier }}-latest" >> $GITHUB_OUTPUT
                echo "frontend_latest=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:frontend-${{ inputs.tier }}-latest" >> $GITHUB_OUTPUT

            - name: Build and push backend image
              if: ${{ inputs.rebuild_backend_image }}
              run: |
                CACHE_ARG=""
                if [ "${{ inputs.no_cache }}" == "true" ]; then
                  CACHE_ARG="--no-cache"
                fi
                
                docker build $CACHE_ARG \
                  -f docker/backend.dockerfile \
                  -t ${{ steps.image-tags.outputs.backend_tag }} \
                  -t ${{ steps.image-tags.outputs.backend_latest }} \
                  .
                
                docker push ${{ steps.image-tags.outputs.backend_tag }}
                docker push ${{ steps.image-tags.outputs.backend_latest }}

            - name: Build and push frontend image
              if: ${{ inputs.rebuild_frontend_image }}
              run: |
                CACHE_ARG=""
                if [ "${{ inputs.no_cache }}" == "true" ]; then
                  CACHE_ARG="--no-cache"
                fi
                
                docker build $CACHE_ARG \
                  -f docker/frontend.dockerfile \
                  -t ${{ steps.image-tags.outputs.frontend_tag }} \
                  -t ${{ steps.image-tags.outputs.frontend_latest }} \
                  .
                
                docker push ${{ steps.image-tags.outputs.frontend_tag }}
                docker push ${{ steps.image-tags.outputs.frontend_latest }}

            - name: Get EC2 instance ID
              id: get-instance
              run: |
                INSTANCE_ID=$(aws ec2 describe-instances \
                  --filters "Name=tag:Name,Values=${{ secrets.EC2_INSTANCE_NAME }}" \
                            "Name=instance-state-name,Values=running" \
                  --query "Reservations[0].Instances[0].InstanceId" \
                  --output text)
                
                if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
                  echo "Error: Could not find running EC2 instance with name ${{ secrets.EC2_INSTANCE_NAME }}"
                  exit 1
                fi
                
                echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
                echo "Found EC2 instance: $INSTANCE_ID"

            - name: Deploy to EC2 via SSM
              run: |
                # Create deployment commands as JSON
                cat > commands.json << 'EOF'
                {
                  "Parameters": {
                    "commands": [
                      "set -e",
                      "echo '=== Starting deployment ==='",
                      "cd ${{ secrets.DOCKER_APP_ROOT }}",
                      "echo '=== Logging in to ECR ==='",
                      "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
                      "echo '=== Creating docker-compose.yml ==='",
                      "cat > docker-compose.yml << 'COMPOSE_EOF'\nversion: \"3\"\nservices:\n  backend:\n    image: ${{ steps.image-tags.outputs.backend_latest }}\n    volumes:\n      - \"${{ secrets.DOCKER_APP_CONFIG_FOLDER }}/config.json:/deploy/server/config.json:ro\"\n      - \"${{ secrets.DOCKER_APP_LOGS_FOLDER }}:/deploy/logs\"\n    ports:\n      - \"10000:10000\"\n    restart: unless-stopped\n  frontend:\n    image: ${{ steps.image-tags.outputs.frontend_latest }}\n    environment:\n      API_HOST: http://backend:10000\n    ports:\n      - \"8400:80\"\n    restart: unless-stopped\nCOMPOSE_EOF",
                      "echo '=== Pulling latest images ==='",
                      "docker compose pull --quiet",
                      "echo '=== Stopping all containers using our ports ==='",
                      "for port in 8400 10000; do docker ps -q | xargs -r docker inspect --format '{{.Id}} {{range \\$p, \\$conf := .NetworkSettings.Ports}}{{\\$p}} {{end}}' 2>/dev/null | grep \"\\${port}/tcp\" | awk '{print \\$1}' | xargs -r docker stop || true; done",
                      "echo '=== Stopping containers via compose ==='",
                      "docker compose down --remove-orphans || true",
                      "sleep 2",
                      "echo '=== Cleaning up stopped containers ==='",
                      "docker container prune -f || true",
                      "echo '=== Starting new containers ==='",
                      "docker compose up -d",
                      "echo '=== Running containers ==='",
                      "docker compose ps",
                      "echo '=== Deployment completed successfully ==='"
                    ]
                  }
                }
                EOF
                
                # Send command to EC2 and execute
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
                  --document-name "AWS-RunShellScript" \
                  --cli-input-json file://commands.json \
                  --query "Command.CommandId" \
                  --output text)
                
                echo "SSM Command ID: $COMMAND_ID"
                
                # Wait for the command to finish
                echo "Waiting for deployment to complete..."
                for i in {1..60}; do
                  STATUS=$(aws ssm get-command-invocation \
                    --command-id "$COMMAND_ID" \
                    --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                    --query "Status" \
                    --output text)
                  
                  echo "Status: $STATUS (attempt $i/60)"
                  
                  if [[ "$STATUS" == "Success" ]]; then
                    echo "✅ Deployment successful!"
                    break
                  elif [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut)$ ]]; then
                    echo "❌ Deployment failed with status: $STATUS"
                    
                    # Print error details before exiting
                    echo ""
                    echo "=== Deployment Output ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardOutputContent" \
                      --output text
                    
                    echo ""
                    echo "=== Deployment Errors ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardErrorContent" \
                      --output text
                    
                    exit 1
                  fi
                  
                  sleep 5
                done
                
                # Get the output on success
                echo ""
                echo "=== Deployment Output ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                  --query "StandardOutputContent" \
                  --output text

            - name: Import dataset
              if: ${{ inputs.import_dataset }}
              run: |
                echo "Importing dataset via SSM..."
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
                  --document-name "AWS-RunShellScript" \
                  --parameters 'commands=["cd ${{ secrets.DOCKER_APP_ROOT }}/database && npm run import"]' \
                  --query "Command.CommandId" \
                  --output text)
                
                # Wait and check status
                sleep 10
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                  --query "StandardOutputContent" \
                  --output text

            - name: Deployment summary
              if: success()
              run: |
                echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
                echo "- **Application**: cprosite" >> $GITHUB_STEP_SUMMARY
                echo "- **Environment**: ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Git Reference**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Backend Image**: ${{ steps.image-tags.outputs.backend_tag }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Frontend Image**: ${{ steps.image-tags.outputs.frontend_tag }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Backend Rebuilt**: ${{ inputs.rebuild_backend_image }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Frontend Rebuilt**: ${{ inputs.rebuild_frontend_image }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Database Imported**: ${{ inputs.import_dataset }}" >> $GITHUB_STEP_SUMMARY
                echo "- **EC2 Instance**: ${{ steps.get-instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
