name: Deploy CProSite
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Deployment Tier"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  Deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      APP: cprosite
      TIER: ${{ inputs.tier }}
      TZ: America/New_York
      AWS_REGION: us-east-1
      BACKEND_IMAGE: ""
      FRONTEND_IMAGE: ""
      BACKEND_IMAGE_LATEST: ""
      FRONTEND_IMAGE_LATEST: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/power-user-github-actions-cicd
          aws-region: ${{ env.AWS_REGION }}

      - name: Download runtime env file from S3
        run: |
          aws s3 cp \
            "s3://${{ vars.CICD_BUCKET }}/env/${{ env.TIER }}/cprosite/${{ env.TIER }}-app.env" \
            "./${{ env.TIER }}-app.env"

      - name: Load runtime variables
        run: |
          set -a
          source "./${{ env.TIER }}-app.env"
          set +a
          env | grep -v '^_' >> "$GITHUB_ENV"

      - name: Set dynamic environment variables
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          REPO=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPO_NAME=${ECR_REPO_NAME:-cprosite}
          echo "ECR_REGISTRY=$REPO" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=$REPO/$ECR_REPO_NAME:backend-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$REPO/$ECR_REPO_NAME:frontend-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_LATEST=$REPO/$ECR_REPO_NAME:backend-${{ inputs.tier }}-latest" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE_LATEST=$REPO/$ECR_REPO_NAME:frontend-${{ inputs.tier }}-latest" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build and push backend image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: docker/backend.dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE_LATEST }}
          cache-to: type=inline

      - name: Deploy to ECS (force new deployment)
        run: |
          CLUSTER="${ECS_CLUSTER:-cprosite-${{ inputs.tier }}}"
          SERVICE="${ECS_WEB_SERVICE:-cprosite-${{ inputs.tier }}}"

          echo "Forcing new ECS deployment..."
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --output table \
            --query "service.{Status:status,DesiredCount:desiredCount,RunningCount:runningCount}"

      - name: Remove old task definitions
        run: |
          for family in "$ECS_WEB_TASK"; do
              echo "Pruning old revisions for family: $family"
              aws ecs list-task-definitions --family-prefix "$family" --sort DESC --query 'taskDefinitionArns[3:]' --output text \
                  | xargs -n1 -r aws ecs deregister-task-definition --task-definition
          done

      - name: Clean up env files
        if: always()
        run: rm -f "./${{ env.TIER }}-app.env"

