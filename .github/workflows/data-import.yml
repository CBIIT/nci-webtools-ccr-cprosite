name: Import CProSite Data
on:
    workflow_dispatch:
        inputs:
            tier:
                description: "Deployment Tier"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - qa
                    - stage
                    - prod
            database_url:
                description: "Database URL"
                required: true
                type: string

env:
    APP: cprosite
    TZ: America/New_York
    AWS_REGION: us-east-1
    AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    DOCKER_APP_ROOT: /local/content/docker_apps/cprosite

jobs:
    Import:
        runs-on: ubuntu-latest
        environment: ${{ inputs.tier }}
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ec2-role-analysistools-${{ inputs.tier }}-role
                aws-region: ${{ env.AWS_REGION }}

            - name: Get EC2 instance ID
              id: get-instance
              run: |
                INSTANCE_ID=$(aws ec2 describe-instances \
                  --filters "Name=tag:Name,Values=${{ secrets.EC2_INSTANCE_NAME }}" \
                            "Name=instance-state-name,Values=running" \
                  --query "Reservations[0].Instances[0].InstanceId" \
                  --output text)
                
                if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
                  echo "Error: Could not find running EC2 instance with name ${{ secrets.EC2_INSTANCE_NAME }}"
                  exit 1
                fi
                
                echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
                echo "Found EC2 instance: $INSTANCE_ID"

            - name: Import cprosite.db via SSM
              run: |
                echo "Starting database import..."
                
                # Create command to import database
                cat > commands.json << 'EOF'
                {
                  "Parameters": {
                    "commands": [
                      "set -e",
                      "echo '=== Starting database import ==='",
                      "cd ${{ env.DOCKER_APP_ROOT }}/database",
                      "echo '=== Backing up existing database ==='",
                      "if [ -f cprosite.db ]; then cp -v cprosite.db cprosite.db.backup.$(date +%Y%m%d_%H%M%S); fi",
                      "echo '=== Downloading database ==='",
                      "rm -f cprosite.db",
                      "curl -o cprosite.db '${{ inputs.database_url }}'",
                      "echo '=== Verifying database file ==='",
                      "ls -lh cprosite.db",
                      "if [ ! -s cprosite.db ]; then echo 'ERROR: Database file is empty'; exit 1; fi",
                      "echo '=== Restarting backend container ==='",
                      "cd ${{ env.DOCKER_APP_ROOT }}",
                      "docker compose restart backend",
                      "echo '=== Database import completed successfully ==='"
                    ]
                  }
                }
                EOF
                
                # Send command to EC2
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
                  --document-name "AWS-RunShellScript" \
                  --cli-input-json file://commands.json \
                  --query "Command.CommandId" \
                  --output text \
                  --timeout-seconds 7200)
                
                echo "SSM Command ID: $COMMAND_ID"
                
                # Wait for command to finish (up to 2 hours)
                echo "Waiting for import to complete..."
                for i in {1..1440}; do
                  STATUS=$(aws ssm get-command-invocation \
                    --command-id "$COMMAND_ID" \
                    --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                    --query "Status" \
                    --output text)
                  
                  echo "Status: $STATUS (attempt $i/1440)"
                  
                  if [[ "$STATUS" == "Success" ]]; then
                    echo "✅ Import successful!"
                    break
                  elif [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut)$ ]]; then
                    echo "❌ Import failed with status: $STATUS"
                    
                    echo ""
                    echo "=== Import Output ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardOutputContent" \
                      --output text
                    
                    echo ""
                    echo "=== Import Errors ==="
                    aws ssm get-command-invocation \
                      --command-id "$COMMAND_ID" \
                      --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                      --query "StandardErrorContent" \
                      --output text
                    
                    exit 1
                  fi
                  
                  sleep 5
                done
                
                # Get output on success
                echo ""
                echo "=== Import Output ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                  --query "StandardOutputContent" \
                  --output text

            - name: Import summary
              if: success()
              run: |
                echo "## Import Summary" >> $GITHUB_STEP_SUMMARY
                echo "- **Application**: cprosite" >> $GITHUB_STEP_SUMMARY
                echo "- **Environment**: ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
                echo "- **Database URL**: ${{ inputs.database_url }}" >> $GITHUB_STEP_SUMMARY
                echo "- **EC2 Instance**: ${{ steps.get-instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "✅ Database import completed successfully!" >> $GITHUB_STEP_SUMMARY
