name: Import CProSite Data
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Deployment Tier"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  Import:
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      APP: cprosite
      TZ: America/New_York
      AWS_REGION: us-east-1
      APP_HOST_ROOT: /local/content/docker_apps/cprosite
      APP_HOST_DATA_FOLDER: /local/content/docker_apps/cprosite/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/ec2-role-analysistools-${{ inputs.tier }}-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ vars.EC2_INSTANCE_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running EC2 instance with name ${{ vars.EC2_INSTANCE_NAME }}"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Import cprosite.db via SSM
        run: |
          # Create command to import database
          cat > commands.json << 'EOF'
          {
            "Parameters": {
              "commands": [
                "set -e",
                "mkdir -p ${{ env.APP_HOST_DATA_FOLDER }}",
                "if [ -f ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db ]; then cp -v ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db.backup.$(date +%Y%m%d_%H%M%S); fi",
                "rm -f ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db",
                "curl -o ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db '${{ vars.DATABASE_URL }}'",
                "if [ ! -s ${{ env.APP_HOST_DATA_FOLDER }}/cprosite.db ]; then echo 'ERROR: Database file is empty'; exit 1; fi",
                "cd ${{ env.APP_HOST_ROOT }}",
                "docker compose restart backend"
              ]
            }
          }
          EOF

          # Send command to EC2
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --cli-input-json file://commands.json \
            --query "Command.CommandId" \
            --output text \
            --timeout-seconds 7200)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to finish (up to 2 hours)
          for i in {1..1440}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query "Status" \
              --output text)

            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Import successful!"
              break
            elif [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut)$ ]]; then
              echo "❌ Import failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardOutputContent" \
                --output text
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            
            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
            --query "StandardOutputContent" \
            --output text

      - name: Import summary
        if: success()
        run: |
          echo "## Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tier:** ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
