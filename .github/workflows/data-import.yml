name: Import CProSite Data
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Deployment Tier"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

jobs:
  Import:
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      APP: cprosite
      APP_NAMESPACE: analysistools
      TIER: ${{ inputs.tier }}
      TZ: America/New_York
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      CICD_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/power-user-github-actions-cicd


    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ env.CICD_ROLE_ARN }}
          role-session-name: ${{ env.TIER }}-cprosite-import-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Retrieve SSM parameters
        run: |
          PARAMETER_PATH="/${APP_NAMESPACE}/${TIER}/${APP}"

          # Map SSM keys (lowercase in Parameter Store) to env vars used by import workflow.
          declare -A PARAMS=(
            ["app_role_arn"]="APP_ROLE_ARN"
            ["ecs_cluster"]="ECS_CLUSTER"
            ["ecs_web_service"]="ECS_WEB_SERVICE"
            ["security_group_ids"]="SECURITY_GROUP_IDS"
            ["subnet_ids"]="SUBNET_IDS"
            ["database_url"]="DATABASE_URL"
            ["efs_access_point_id"]="EFS_ACCESS_POINT_ID"
            ["ecs_import_task"]="ECS_IMPORT_TASK"
            ["ecs_import_cpu_units"]="ECS_IMPORT_CPU_UNITS"
            ["ecs_import_memory_units"]="ECS_IMPORT_MEMORY_UNITS"
          )

          for ssm_name in "${!PARAMS[@]}"; do
            env_var="${PARAMS[$ssm_name]}"
            value=$(aws ssm get-parameter \
              --name "${PARAMETER_PATH}/${ssm_name}" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text 2>/dev/null || true)
            if [[ -n "$value" && "$value" != "None" ]]; then
              echo "${env_var}=${value}" >> "$GITHUB_ENV"
              echo "Retrieved ${ssm_name} -> ${env_var}"
            fi
          done

          # Prefer stack-published EFS filesystem parameter; fallback to app-env key.
          EFS_VALUE=$(aws ssm get-parameter \
            --name "${PARAMETER_PATH}/efs_filesystem_id" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text 2>/dev/null || true)
          if [[ -z "$EFS_VALUE" || "$EFS_VALUE" == "None" ]]; then
            EFS_VALUE=$(aws ssm get-parameter \
              --name "${PARAMETER_PATH}/efs_id" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text 2>/dev/null || true)
          fi
          if [[ -n "$EFS_VALUE" && "$EFS_VALUE" != "None" ]]; then
            echo "EFS_ID=${EFS_VALUE}" >> "$GITHUB_ENV"
            echo "Retrieved efs_filesystem_id/efs_id -> EFS_ID"
          fi

      - name: Validate required import parameters
        run: |
          : "${APP_ROLE_ARN:?Missing APP_ROLE_ARN from SSM Parameter Store}"
          : "${ECS_CLUSTER:?Missing ECS_CLUSTER from SSM Parameter Store}"
          : "${ECS_WEB_SERVICE:?Missing ECS_WEB_SERVICE from SSM Parameter Store}"
          : "${SECURITY_GROUP_IDS:?Missing SECURITY_GROUP_IDS from SSM Parameter Store}"
          : "${SUBNET_IDS:?Missing SUBNET_IDS from SSM Parameter Store}"
          : "${EFS_ID:?Missing EFS_ID from SSM Parameter Store}"
          : "${DATABASE_URL:?Missing DATABASE_URL from SSM Parameter Store}"

      - name: Get infrastructure details
        id: infra
        run: |
          AP_ID="${EFS_ACCESS_POINT_ID}"
          if [ -z "$AP_ID" ] || [ "$AP_ID" = "None" ]; then
            AP_ID=$(aws cloudformation describe-stacks \
              --stack-name "cprosite-app-${{ inputs.tier }}" \
              --query "Stacks[0].Outputs[?OutputKey=='EfsAccessPointId'].OutputValue" \
              --output text)
          fi

          if [ -z "$AP_ID" ] || [ "$AP_ID" = "None" ]; then
            echo "Missing EFS access point ID. Set EFS_ACCESS_POINT_ID or ensure stack output EfsAccessPointId exists."
            exit 1
          fi

          SUBNET_ID=$(echo "$SUBNET_IDS" | cut -d',' -f1 | xargs)
          ECS_SG=$(echo "$SECURITY_GROUP_IDS" | cut -d',' -f1 | xargs)

          EXEC_ROLE="$APP_ROLE_ARN"
          TASK_ROLE="$APP_ROLE_ARN"

          CLUSTER_NAME="${ECS_CLUSTER}"
          SERVICE_NAME="${ECS_WEB_SERVICE}"
          IMPORT_TASK_FAMILY="${ECS_IMPORT_TASK:-cprosite-${TIER}-import}"
          IMPORT_CPU_UNITS="${ECS_IMPORT_CPU_UNITS:-512}"
          IMPORT_MEMORY_UNITS="${ECS_IMPORT_MEMORY_UNITS:-1024}"

          echo "efs_id=$EFS_ID"       >> $GITHUB_OUTPUT
          echo "ap_id=$AP_ID"         >> $GITHUB_OUTPUT
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "ecs_sg=$ECS_SG"       >> $GITHUB_OUTPUT
          echo "exec_role=$EXEC_ROLE" >> $GITHUB_OUTPUT
          echo "task_role=$TASK_ROLE" >> $GITHUB_OUTPUT
          echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "import_task_family=$IMPORT_TASK_FAMILY" >> $GITHUB_OUTPUT
          echo "import_cpu_units=$IMPORT_CPU_UNITS" >> $GITHUB_OUTPUT
          echo "import_memory_units=$IMPORT_MEMORY_UNITS" >> $GITHUB_OUTPUT

      - name: Ensure CloudWatch log group exists
        run: |
          aws logs create-log-group \
            --log-group-name "/ecs/cprosite-${{ inputs.tier }}-import" 2>/dev/null || true

      - name: Register one-off import task definition
        id: register-task
        run: |
          export APP_ROLE_ARN="${{ steps.infra.outputs.exec_role }}"
          export EFS_ID="${{ steps.infra.outputs.efs_id }}"
          export EFS_ACCESS_POINT_ID="${{ steps.infra.outputs.ap_id }}"
          export ECS_IMPORT_TASK="${{ steps.infra.outputs.import_task_family }}"
          export ECS_IMPORT_CPU_UNITS="${{ steps.infra.outputs.import_cpu_units }}"
          export ECS_IMPORT_MEMORY_UNITS="${{ steps.infra.outputs.import_memory_units }}"
          export ENVIRONMENT_TIER="${TIER^^}"

          perl -pe 's/\$\{([A-Z0-9_]+)\}/exists $ENV{$1} ? $ENV{$1} : ""/ge' \
            .github/aws/data-import.yml > task-def.yml

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-yaml file://task-def.yml \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $TASK_DEF_ARN"

      - name: Run import task on EFS
        id: run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.infra.outputs.cluster_name }}" \
            --task-definition "${{ steps.register-task.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --platform-version "1.4.0" \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.infra.outputs.subnet_id }}],securityGroups=[${{ steps.infra.outputs.ecs_sg }}],assignPublicIp=DISABLED}" \
            --query "tasks[0].taskArn" \
            --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "Import task started: $TASK_ARN"

      - name: Wait for import task to complete (up to 2 hours)
        run: |
          CLUSTER="${{ steps.infra.outputs.cluster_name }}"
          TASK_ARN="${{ steps.run-task.outputs.task_arn }}"

          echo "Polling task status..."
          for i in $(seq 1 1440); do
            LAST_STATUS=$(aws ecs describe-tasks \
              --cluster "$CLUSTER" \
              --tasks "$TASK_ARN" \
              --query "tasks[0].lastStatus" \
              --output text)

            echo "[$i/1440] Status: $LAST_STATUS"

            if [ "$LAST_STATUS" = "STOPPED" ]; then
              break
            fi

            sleep 5
          done

          # Verify final status
          STOP_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query "tasks[0].stopCode" \
            --output text)

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query "tasks[0].containers[?name=='importer'].exitCode | [0]" \
            --output text)

          echo "Stop code : $STOP_CODE"
          echo "Exit code : $EXIT_CODE"
          echo "Logs      : https://${{ env.AWS_REGION }}.console.aws.amazon.com/cloudwatch/home#logsV2:log-groups/log-group/%2Fecs%2Fcprosite-${{ inputs.tier }}-import"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Import failed. Check CloudWatch: /ecs/cprosite-${{ inputs.tier }}-import"
            exit 1
          fi

          echo "✅ Import complete"

      - name: Force ECS service redeployment
        run: |
          echo "Forcing new deployment so the service picks up the updated database..."
          aws ecs update-service \
            --cluster "${{ steps.infra.outputs.cluster_name }}" \
            --service "${{ steps.infra.outputs.service_name }}" \
            --force-new-deployment \
            --output table \
            --query "service.{Status:status,DesiredCount:desiredCount,RunningCount:runningCount}"

      - name: Import summary
        if: success()
        run: |
          echo "## Import Summary"                                                  >> $GITHUB_STEP_SUMMARY
          echo ""                                                                   >> $GITHUB_STEP_SUMMARY
          echo "- **Tier:** ${{ inputs.tier }}"                                    >> $GITHUB_STEP_SUMMARY
          echo "- **EFS File System:** ${{ steps.infra.outputs.efs_id }}"          >> $GITHUB_STEP_SUMMARY
          echo "- **EFS Access Point:** ${{ steps.infra.outputs.ap_id }}"          >> $GITHUB_STEP_SUMMARY
          echo "- **Task ARN:** ${{ steps.run-task.outputs.task_arn }}"             >> $GITHUB_STEP_SUMMARY
          echo "- **Logs:** \`/ecs/cprosite-${{ inputs.tier }}-import\`"           >> $GITHUB_STEP_SUMMARY

      - name: Clean up env files
        if: always()
        run: rm -f ./task-def.yml

