services:
  backend:
    image: ${BACKEND_IMAGE_LATEST}
    environment:
      NODE_ENV: production
    volumes:
      - "${APP_HOST_CONFIG_FOLDER}/config.json:/deploy/server/config.json:ro"
      - "${APP_HOST_CONFIG_FOLDER}/contrast_security.yaml:/deploy/server/contrast_security.yaml:ro"
      - "${APP_HOST_LOGS_FOLDER}:/deploy/logs"
      - "${APP_HOST_DATA_FOLDER}:/deploy/database"
    ports:
      - "${BACKEND_PORT}:8000"
    restart: unless-stopped
  frontend:
    image: ${FRONTEND_IMAGE_LATEST}
    environment:
      API_HOST: http://backend:8000
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped
